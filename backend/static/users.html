<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý User - MemberTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css?v=1.4">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title mb-0">Quản lý User</h1>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary rounded-pill shadow-sm" onclick="openUserModal()">
                        <i class="bi bi-person-plus"></i> Thêm User mới
                    </button>
                </div>
            </div>

            <div class="glass-card border-0 shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                                <th class="text-end pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="user-list">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- User Modal -->
    <div class="modal fade" id="user-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="user-modal-title">Thêm User mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="user-form">
                        <input type="hidden" id="u-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Username</label>
                            <input type="text" class="form-control rounded-3" id="u-username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" class="form-control rounded-3" id="u-email" required>
                        </div>
                        <div id="password-group" class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" class="form-control rounded-3" id="u-password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">System Role</label>
                            <select id="u-role" class="form-select rounded-3">
                                <option value="member">Member</option>
                                <option value="pm">Project Manager</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Mattermost ID (Optional)</label>
                            <input type="text" class="form-control rounded-3" id="u-mm-id" placeholder="ID trên Mattermost">
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="u-active" checked>
                            <label class="form-check-label small fw-bold" for="u-active">Đang hoạt động</label>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js?v=1.4"></script>
    <script src="assets/js/ui.js?v=1.4"></script>
    <script src="assets/js/components.js?v=1.4"></script>
    <script>
        Components.injectSidebar('nav-users');

        async function loadUsers() {
            const resp = await api.get('/users');
            const container = document.getElementById('user-list');
            if (resp) {
                container.innerHTML = resp.map(u => `
                    <tr>
                        <td class="ps-4 fw-bold text-dark">${UI.esc(u.username)}</td>
                        <td>${UI.esc(u.email)}</td>
                        <td><span class="badge bg-secondary-subtle text-secondary rounded-pill">${u.system_role.toUpperCase()}</span></td>
                        <td>
                            <span class="badge ${u.is_active ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'} rounded-pill">
                                ${u.is_active ? 'Hoạt động' : 'Tạm khóa'}
                            </span>
                        </td>
                        <td>${UI.fmtDate(u.created_at)}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary rounded-pill me-1" onclick='openUserModal(${JSON.stringify(u)})'>
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="deleteUser(${u.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="6" class="text-center p-4 text-muted">Chưa có user nào</td></tr>';
            }
        }

        function openUserModal(user = null) {
            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('user-modal'));
            const form = document.getElementById('user-form');
            form.reset();
            
            if (user) {
                document.getElementById('user-modal-title').innerText = 'Sửa User';
                document.getElementById('u-id').value = user.id;
                document.getElementById('u-username').value = user.username;
                document.getElementById('u-email').value = user.email;
                document.getElementById('u-role').value = user.system_role;
                document.getElementById('u-active').checked = user.is_active;
                document.getElementById('u-mm-id').value = user.mattermost_id || '';
                document.getElementById('password-group').style.display = 'none';
            } else {
                document.getElementById('user-modal-title').innerText = 'Thêm User mới';
                document.getElementById('u-id').value = '';
                document.getElementById('password-group').style.display = 'block';
            }
            modal.show();
        }

        document.getElementById('user-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('u-id').value;
            const payload = {
                username: document.getElementById('u-username').value,
                email: document.getElementById('u-email').value,
                system_role: document.getElementById('u-role').value,
                is_active: document.getElementById('u-active').checked,
                mattermost_id: document.getElementById('u-mm-id').value || null
            };
            if (!id) payload.password = document.getElementById('u-password').value;

            const url = id ? `/users/${id}` : '/users';
            const method = id ? 'patch' : 'post';
            // Note: Patch might not lead directly to 'users' but 'users/{id}'
            // Need to implement PATCH /users/{id} in backend
            const resp = await api[method](url, payload);
            if (resp?.success) {
                bootstrap.Modal.getInstance(document.getElementById('user-modal')).hide();
                UI.toast(id ? "Đã cập nhật" : "Đã thêm mới");
                loadUsers();
            } else UI.handleError(resp.error || {message: "Lỗi"});
        };

        async function deleteUser(id) {
            const confirmed = await UI.confirmDialog("Bạn có chắc chắn muốn xóa user này?");
            if (confirmed) {
                const resp = await api.delete(`/users/${id}`);
                if (resp?.success) {
                    UI.toast("Đã xóa user thành công");
                    loadUsers();
                } else UI.handleError(resp.error || {message: "Không thể xóa user"});
            }
        }

        loadUsers();
    </script>
</body>
</html>
