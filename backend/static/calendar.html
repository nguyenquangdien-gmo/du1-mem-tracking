<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch làm việc - Member Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
    <style>
        .calendar-wrapper { border: 1px solid #dee2e6; border-radius: 0.5rem; overflow: hidden; background: #fff; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8f9fa; border-bottom: 1px solid #dee2e6; font-weight: bold; text-align: center; }
        .calendar-header div { padding: 0.75rem 0; }
        .calendar-body { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { min-height: 120px; border-right: 1px solid #dee2e6; border-bottom: 1px solid #dee2e6; padding: 0.5rem; cursor: pointer; transition: background 0.2s; position: relative; }
        .calendar-day:nth-child(7n) { border-right: none; }
        .calendar-day:hover { background: #f8f9fa; }
        .calendar-day.empty { background: #fafafa; cursor: default; }
        .calendar-day.empty:hover { background: #fafafa; }
        .day-number { font-weight: 600; margin-bottom: 0.35rem; display: inline-block; width: 28px; height: 28px; text-align: center; line-height: 28px; border-radius: 50%; font-size: 0.9rem; }
        .calendar-day.today .day-number { background: #0d6efd; color: white; }
        .calendar-day.weekend { background: #fdfdfd; }
        .calendar-day.holiday-bg { background: #fff5f5; }
        .calendar-day.holiday-bg .day-number { color: #dc3545; }
        .event-badge { font-size: 0.75rem; padding: 0.25rem 0.4rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; border-radius: 4px; font-weight: 500; }
        .event-badge.leave { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .event-badge.holiday { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .event-badge.special { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .event-badge.vn-holiday { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .event-badge.task_deadline { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; border-left: 3px solid #dc3545; }
        .day-events { max-height: 85px; overflow-y: auto; scrollbar-width: none; }
        .day-events::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar dynamically injected here -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar d-flex justify-content-between align-items-center mb-4">
                <h1 class="page-title mb-0">Lịch làm việc</h1>
                <!-- Gỡ bỏ user profile và đăng xuất theo yêu cầu -->
            </div>

            <div class="glass-card mb-4 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex gap-2 align-items-center">
                        <button class="btn btn-outline-secondary" id="btn-prev-month"><i class="bi bi-chevron-left"></i></button>
                        <h4 class="mb-0 fw-bold mx-3 text-primary" id="current-month-display">Tháng --/----</h4>
                        <button class="btn btn-outline-secondary" id="btn-next-month"><i class="bi bi-chevron-right"></i></button>
                    </div>
                    <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="openCalendarModal()"><i class="bi bi-plus-lg me-1"></i> Thêm sự kiện</button>
                </div>

                <div class="calendar-wrapper shadow-sm">
                    <div class="calendar-header">
                        <div class="text-danger">CN</div>
                        <div>T2</div>
                        <div>T3</div>
                        <div>T4</div>
                        <div>T5</div>
                        <div>T6</div>
                        <div class="text-danger">T7</div>
                    </div>
                    <div class="calendar-body" id="calendar-grid">
                        <!-- JS renders calendar cells here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Day Details Modal -->
    <div class="modal fade" id="day-details-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="day-details-title">Chi tiết ngày</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="day-details-content" class="mb-4"></div>
                    <div class="d-flex justify-content-end gap-2 border-top pt-3">
                        <button type="button" class="btn btn-outline-warning rounded-pill px-3" onclick="openCalendarModal('leave')"><i class="bi bi-person-dash me-1"></i>Nghỉ phép</button>
                        <button type="button" class="btn btn-primary rounded-pill px-3" onclick="openCalendarModal('holiday')"><i class="bi bi-calendar-event me-1"></i>Thêm sự kiện</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="calendar-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Thêm sự kiện / Nghỉ phép</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="calendar-form">
                        <input type="hidden" id="event-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Ngày</label>
                            <input type="date" class="form-control" id="event-date" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Loại sự kiện</label>
                            <select class="form-select" id="event-type" required onchange="toggleMemberField()">
                                <option value="leave">Nghỉ phép (Cá nhân)</option>
                                <option value="holiday">Nghỉ Lễ (Toàn công ty)</option>
                                <option value="special">Đặc biệt</option>
                            </select>
                        </div>
                        <div class="mb-3" id="member-field-container">
                            <label class="form-label small fw-bold">Thành viên xin nghỉ</label>
                            <select class="form-select" id="event-member"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Ghi chú</label>
                            <textarea class="form-control" id="event-description" rows="2" placeholder="Lý do..."></textarea>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js?v=1.5"></script>
    <script src="assets/js/ui.js?v=1.4"></script>
    <script src="assets/js/components.js?v=1.4"></script>
    <script>
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth() + 1; // 1-12
        let allMembers = [];
        let eventsData = [];
        let currentSelectedDateStr = '';

        function getVNHolidays(year) {
            return {
                [`${year}-01-01`]: "Tết Dương lịch",
                [`${year}-04-30`]: "Giải phóng miền Nam",
                [`${year}-05-01`]: "Quốc tế Lao động",
                [`${year}-09-02`]: "Quốc khánh"
                // Bạn có thể mở rộng danh sách tại đây
            };
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.isAuthenticated()) { window.location.href = 'login.html'; return; }
            
            Components.injectSidebar('nav-calendar');
            
            // Load members for dropdown
            const resp = await api.get('/members');
            if (resp && resp.success) {
                allMembers = resp.data;
                const mSelect = document.getElementById('event-member');
                mSelect.innerHTML = '<option value="">-- Chọn thành viên --</option>' + 
                    allMembers.map(m => `<option value="${m.id}">${UI.esc(m.full_name)}</option>`).join('');
            }

            document.getElementById('btn-prev-month').addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 1) { currentMonth = 12; currentYear--; }
                loadCalendar();
            });

            document.getElementById('btn-next-month').addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                loadCalendar();
            });

            document.getElementById('calendar-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveEvent();
            });

            loadCalendar();
        });

        function toggleMemberField() {
            const type = document.getElementById('event-type').value;
            const container = document.getElementById('member-field-container');
            if (type === 'holiday' || type === 'special') {
                container.style.display = 'none';
                document.getElementById('event-member').value = '';
            } else {
                container.style.display = 'block';
            }
        }

        async function loadCalendar() {
            document.getElementById('current-month-display').textContent = `Tháng ${currentMonth}/${currentYear}`;
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem;">Đang tải dữ liệu...</div>';
            
            const resp = await api.get(`/calendar?year=${currentYear}&month=${currentMonth}`);
            if (resp && resp.success) {
                eventsData = resp.data;
                renderCalendarGrid();
            } else {
                grid.innerHTML = '<div class="text-danger p-3">Lỗi khi tải dữ liệu!</div>';
            }
        }

        function renderCalendarGrid() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay(); // 0 is Sun
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === currentYear && (today.getMonth() + 1) === currentMonth;
            const currentDay = today.getDate();
            
            const vnHolidays = getVNHolidays(currentYear);
            
            // Empty cells before 1st
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-day empty"></div>`;
            }
            
            // Days
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = isCurrentMonth && d === currentDay;
                const dayOfWeek = new Date(currentYear, currentMonth - 1, d).getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                
                let dayEvents = eventsData.filter(e => e.calendar_date === dateStr);
                let vnHolidayName = vnHolidays[dateStr];
                
                let isHoliday = vnHolidayName || dayEvents.some(e => e.type === 'holiday');
                
                let cellClass = 'calendar-day';
                if (isToday) cellClass += ' today';
                if (isWeekend) cellClass += ' weekend';
                if (isHoliday) cellClass += ' holiday-bg';
                
                let eventsHtml = '';
                if (vnHolidayName) {
                    eventsHtml += `<div class="event-badge vn-holiday" title="${vnHolidayName}">${vnHolidayName}</div>`;
                }
                
                let taskEvents = dayEvents.filter(e => e.type === 'task_deadline');
                let otherEvents = dayEvents.filter(e => e.type !== 'task_deadline');

                otherEvents.forEach(e => {
                    let cls = e.type;
                    let text = e.type === 'leave' ? `Nghỉ phép: ${e.member_name}` : e.description || e.type;
                    eventsHtml += `<div class="event-badge ${cls}" title="${text}">${text}</div>`;
                });

                if (taskEvents.length > 0) {
                    let titleText = taskEvents.map(t => t.description).join('\n');
                    let displayText = `<i class="bi bi-list-task"></i> ${taskEvents.length} Task${taskEvents.length > 1 ? 's' : ''}`;
                    eventsHtml += `<div class="event-badge task_deadline text-center" title="${UI.esc(titleText)}">${displayText}</div>`;
                }
                
                grid.innerHTML += `
                    <div class="${cellClass}" onclick="openDayDetails('${dateStr}')">
                        <div class="day-number">${d}</div>
                        <div class="day-events">${eventsHtml}</div>
                    </div>
                `;
            }
        }

        function openDayDetails(dateStr) {
            currentSelectedDateStr = dateStr;
            const dateObj = new Date(dateStr);
            document.getElementById('day-details-title').textContent = `Sự kiện ngày ${dateObj.toLocaleDateString('vi-VN')}`;
            
            const dayEvents = eventsData.filter(e => e.calendar_date === dateStr);
            const vnHolidayName = getVNHolidays(currentYear)[dateStr];
            
            let html = '';
            if (vnHolidayName) {
                html += `<div class="alert alert-danger p-2 mb-3 shadow-sm border-0"><i class="bi bi-star-fill me-2"></i><strong>Lễ VN:</strong> ${vnHolidayName}</div>`;
            }
            
            if (dayEvents.length === 0 && !vnHolidayName) {
                html += `<div class="text-muted text-center py-4 bg-light rounded-3">Không có sự kiện hay ai nghỉ phép vào ngày này.</div>`;
            } else if (dayEvents.length > 0) {
                html += '<ul class="list-group list-group-flush border rounded-3 overflow-hidden">';
                dayEvents.forEach(e => {
                    let isTask = e.is_task;
                    let icon = '';
                    let color = '';
                    if (e.type === 'leave') { icon = 'bi-person-dash'; color = 'text-warning'; }
                    else if (e.type === 'holiday') { icon = 'bi-flag-fill'; color = 'text-success'; }
                    else if (e.type === 'task_deadline') { icon = 'bi-exclamation-circle-fill'; color = 'text-danger'; }
                    else { icon = 'bi-info-circle-fill'; color = 'text-info'; }
                    
                    let name = e.member_name ? `<strong>${UI.esc(e.member_name)}</strong>` : (isTask ? `<strong>Task Deadline</strong>` : `<em>Toàn công ty</em>`);
                    let desc = e.description ? `<div class="small text-secondary mt-1"><i class="bi bi-chat-left-text me-1"></i>${UI.esc(e.description)}</div>` : '';
                    let actionBtn = isTask ? 
                        `<a href="projects.html?id=${e.project_id}&tab=tasks" class="btn btn-sm btn-outline-primary border-0" title="Mở dự án"><i class="bi bi-arrow-right-circle"></i></a>` :
                        `<button class="btn btn-sm btn-outline-danger border-0" onclick="deleteEvent(${e.id}, event)" title="Xóa"><i class="bi bi-trash"></i></button>`;
                    
                    html += `
                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <div>
                                <div class="d-flex align-items-center">
                                    <i class="bi ${icon} ${color} me-2 fs-5"></i> 
                                    <span class="fs-6">${name}</span>
                                </div>
                                ${desc}
                            </div>
                            ${actionBtn}
                        </li>
                    `;
                });
                html += '</ul>';
            }
            
            document.getElementById('day-details-content').innerHTML = html;
            
            const modal = new bootstrap.Modal(document.getElementById('day-details-modal'));
            modal.show();
        }

        function openCalendarModal(defaultType = 'leave') {
            const d = currentSelectedDateStr || new Date().toISOString().split('T')[0];
            document.getElementById('event-id').value = '';
            document.getElementById('event-date').value = d;
            document.getElementById('event-type').value = defaultType;
            document.getElementById('event-member').value = '';
            document.getElementById('event-description').value = '';
            toggleMemberField();
            
            const detailsModal = bootstrap.Modal.getInstance(document.getElementById('day-details-modal'));
            if (detailsModal) detailsModal.hide();
            
            const modal = new bootstrap.Modal(document.getElementById('calendar-modal'));
            modal.show();
        }

        async function saveEvent() {
            const id = document.getElementById('event-id').value;
            const payload = {
                calendar_date: document.getElementById('event-date').value,
                type: document.getElementById('event-type').value,
                member_id: document.getElementById('event-member').value ? parseInt(document.getElementById('event-member').value) : null,
                description: document.getElementById('event-description').value
            };

            const resp = id ? await api.put(`/calendar/${id}`, payload) : await api.post('/calendar', payload);
            
            if (resp && resp.success) {
                bootstrap.Modal.getInstance(document.getElementById('calendar-modal')).hide();
                loadCalendar();
            } else {
                Dialogs.alert(resp?.error?.message || 'Có lỗi xảy ra');
            }
        }

        async function deleteEvent(id, eventObj) {
            if (eventObj) eventObj.stopPropagation();
            if (await Dialogs.confirm('Bạn có chắc muốn xóa sự kiện này?')) {
                const resp = await api.delete(`/calendar/${id}`);
                if (resp && resp.success) {
                    const detailsModal = bootstrap.Modal.getInstance(document.getElementById('day-details-modal'));
                    if (detailsModal) detailsModal.hide();
                    loadCalendar();
                }
            }
        }
    </script>
</body>
</html>
