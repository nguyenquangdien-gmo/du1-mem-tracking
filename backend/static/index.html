<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Tracking | Dashboard</title>
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css?v=1.4">
</head>
<body>
    <div class="layout">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item active">Dashboard</li>
                    </ol>
                </nav>
                <div class="top-actions d-flex gap-2">
                </div>
            </header>

            <div class="glass-card mb-4 border-0 shadow-sm" style="position: relative; z-index: 1050;">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h1 class="h3 mb-0 fw-bold">Tổng quan hệ thống</h1>
                    </div>
                    <div class="col-md-6">
                        <div class="search-box position-relative">
                            <input type="text" class="form-control rounded-pill ps-5" placeholder="Tìm kiếm member, dự án..." id="global-search">
                            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
                            <div class="search-results shadow-sm rounded-4 border p-2" id="search-results-dropdown" style="display:none; position:absolute; top:110%; left:0; right:0; background:white; z-index:1000;"></div>
                        </div>
                    </div>
                </div>
            </div>
                
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="glass-card" style="cursor: pointer" onclick="window.location.href='projects.html'" title="Chuyển đến màn hình Dự án">
                            <div class="text-secondary small mb-1">Dự án hoạt động</div>
                            <div class="h2 fw-bold mb-0 text-decoration-underline" id="stat-total-projects">0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass-card" style="cursor: pointer" onclick="window.location.href='members.html'" title="Chuyển đến màn hình Thành viên">
                            <div class="text-secondary small mb-1">Thành viên</div>
                            <div class="h2 fw-bold mb-0 text-decoration-underline" id="stat-active-members">0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass-card" style="cursor: pointer" onclick="window.location.href='projects.html'" title="Chuyển đến màn hình Dự án">
                            <div class="text-secondary small mb-1">Thành viên chưa có task</div>
                            <div class="h2 fw-bold mb-0 text-warning text-decoration-underline" id="stat-idle-members">0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass-card" style="cursor: pointer" onclick="window.location.href='projects.html?tab=tasks'" title="Chuyển đến màn hình Dự án">
                            <div class="text-secondary small mb-1">Task trễ hạn</div>
                            <div class="h2 fw-bold mb-0 text-danger text-decoration-underline" id="stat-overdue-tasks">0</div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="glass-card h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="mb-0">Dự án mới nhất</h5>
                                <a href="projects.html" class="btn btn-link text-primary p-0">Xem tất cả</a>
                            </div>
                            <div id="dashboard-project-list" class="list-group list-group-flush">
                                <div class="text-center py-5">Đang tải...</div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="glass-card h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="mb-0">Thành viên chưa có task</h5>
                                <a href="projects.html" class="btn btn-link text-primary p-0">Xem tất cả</a>
                            </div>
                            <div id="dashboard-available-members" class="list-group list-group-flush">
                                <div class="text-center py-5">Đang tải...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JS Dependencies -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="assets/js/api.js?v=1.3"></script>
    <script src="assets/js/ui.js?v=1.4"></script>
    <script src="assets/js/components.js?v=1.4"></script>
    <script src="assets/js/app.js?v=1.13"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isAuthenticated()) { window.location.href = 'login.html'; return; }
            Components.injectSidebar('nav-dashboard');
            DashboardUI.initDashboard();
            UI.applyPermissions();
        });
    </script>
</body>
</html>
